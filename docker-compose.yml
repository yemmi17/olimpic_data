services:
  olimpic-data:
    build:
      context: .
    image: olimpic-data:latest
    container_name: olimpic-data
    ports:
      - "${OLIMPIC_HOST_PORT:-8088}:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/olimpic/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
